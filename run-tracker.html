async function dbLoad() {
  const { data, error } = await sb.from('run_logs').select('*');
  if (error) throw error;
  const out = {};
  data.forEach(r => {
    out[r.week_day] = {
      miles: r.miles||'', pace: r.pace||'', feel: r.feel||'good',
      note: r.note||'', skipped: r.skipped||false,
      inputMode: r.input_mode||'time',
      totalMins: r.total_mins||'', totalSecs: r.total_secs||''
    };
  });
  return out;
}

async function dbSave(key, entry) {
  const { data: ex } = await sb.from('run_logs').select('id').eq('week_day', key);
  const row = {
    week_day: key, miles: entry.miles||null, pace: entry.pace||null,
    feel: entry.feel||null, note: entry.note||null, skipped: entry.skipped||false,
    input_mode: entry.inputMode||'time', total_mins: entry.totalMins||null,
    total_secs: entry.totalSecs||null, saved_at: Date.now()
  };
  if (ex && ex.length > 0) {
    const { error } = await sb.from('run_logs').update(row).eq('week_day', key);
    if (error) throw error;
  } else {
    const { error } = await sb.from('run_logs').insert(row);
    if (error) throw error;
  }
}

async function dbDelete(key) {
  const { error } = await sb.from('run_logs').delete().eq('week_day', key);

function extractMiles(label) {
  if (!label) return 0;
  const sumMatch = label.match(/([\d.]+(?:\+[\d.]+)+)\s*mi/);
  if (sumMatch) return sumMatch[1].split('+').reduce((a,n)=>a+parseFloat(n),0);
  const intervalMatch = label.match(/([\d.]+)[x×]([\d.]+)\s*mi/);
  if (intervalMatch) return parseFloat(intervalMatch[1]) * parseFloat(intervalMatch[2]);
  const singleMatch = label.match(/([\d.]+)\s*mi/);
  return singleMatch ? parseFloat(singleMatch[1]) : 0;
}

function weekTotal(w) {
  if (w.week === 18) return 'Race week';
  const s = ALL_DAYS.reduce((a,d)=>{ const r=w.days[d]; return (!r||r.type==='rest')?a:a+extractMiles(r.label); },0);
  return `${s%1===0?s:s.toFixed(1)} mi`;
}

function calcPace(m,s,mi) {
  const t=(parseInt(m)||0)*60+(parseInt(s)||0), miles=parseFloat(mi);
  if(!t||!miles) return '';
  const spm=t/miles;
  return `${Math.floor(spm/60)}:${String(Math.round(spm%60)).padStart(2,'0')}`;
}

function getRunDate(weekNum, day) {
  const start = new Date('2026-06-16'); // Week 1 Tuesday
  const offsets = { Tue:0, Thu:2, Fri:3, Sat:4, Sun:5 };
  const d = new Date(start);
  d.setDate(start.getDate() + (weekNum-1)*7 + (offsets[day]||0));
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

function getRunInstructions(run) {
  if (!run) return '';
  // Specific overrides
  if (run.label && run.label.includes('5K')) return "Run the 5K at a comfortable effort — not all out. Think of it as a tempo run with a bib. Aim for 9:00–9:20/mi. This is a training run, not a race. Warm up 10 min easy before the start gun.";
  if (run.label && run.label.includes('strides')) return "Run 2 miles easy to warm up your legs, then do 4×20-second accelerations (strides). Sprint to about 85% effort for 20 seconds, walk back to start, repeat. These wake your legs up without tiring them out before race day.";
  if (run.label && run.label.includes('makeup')) return "This is a gentle makeup run since you missed last week's long run. Keep it very easy — 9:30–10:30/mi. Just get the miles in, no pressure on pace.";
  if (run.label && run.label.includes('recovery')) return "Pure recovery run — go as slow as you want. 10:00/mi or slower is fine. Your legs just raced yesterday and need blood flow, not effort.";
  if (run.label && run.label.includes('race pace feel')) return "Run 3 miles at what you think race pace feels like (9:00–9:10/mi). This is a reminder to your body of what the goal pace feels like. Not a hard effort — just a controlled preview.";
  if (run.label && run.label.includes('lay out')) return "Complete rest. Use tonight to lay out your race kit — shoes, socks, shorts, shirt, race bib. Pin the bib on. Set two alarms for tomorrow morning. Eat your normal dinner, nothing new.";
  return INSTRUCTIONS[run.type] || '';
}

            <div style={{fontSize:10,fontWeight:700,letterSpacing:3,color:'#475569',textTransform:'uppercase',marginBottom:4}}>Columbus Half Marathon · Oct 18</div>
            <div style={{fontSize:24,fontWeight:900,letterSpacing:'-.5px'}}>Training Tracker</div>
            <div style={{fontSize:10,marginTop:5,display:'flex',alignItems:'center',gap:5}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:dbStatus==='ok'?'#10b981':dbStatus==='loading'?'#f59e0b':'#ef4444'}}/>
              <span style={{color:dbStatus==='ok'?'#10b981':dbStatus==='loading'?'#f59e0b':'#ef4444',fontWeight:600}}>
                {dbStatus==='ok'?'✓ Synced':dbStatus==='loading'?'Connecting…':'Connection error'}
              </span>
            </div>
          </div>
          <div style={{position:'relative',width:62,height:62,flexShrink:0}}>
            <svg width="62" height="62" style={{transform:'rotate(-90deg)'}}>
              <circle cx="31" cy="31" r="26" fill="none" stroke="#1e293b" strokeWidth="5"/>
              <circle cx="31" cy="31" r="26" fill="none" stroke="#10b981" strokeWidth="5"
                strokeDasharray={`${2*Math.PI*26}`}
                strokeDashoffset={`${2*Math.PI*26*(1-pct/100)}`}
                strokeLinecap="round" style={{transition:'stroke-dashoffset .6s ease'}}/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <div style={{fontSize:11,fontWeight:900,color:'#10b981',lineHeight:1}}>{weekTotal(w)}</div>
              <div style={{fontSize:8,color:'#4ade80',marginTop:1}}>wk {w.week}</div>
            </div>
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {[[weekTotal(w),'This Week','#10b981'],[String(totalLogged),'Runs Done','#3b82f6'],[String(totalSkipped),'Skipped','#f59e0b']].map(([v,l,c])=>(
            <div key={l} style={{flex:1,background:'#1e293b',borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
              <div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div>
              <div style={{fontSize:10,color:'#475569',fontWeight:600,marginTop:1}}>{l}</div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',gap:2}}>
          {[['plan','📅 Plan'],['coach',`💬 Coach${coachCount?` (${coachCount})`:''}`]].map(([v,label])=>(
            <button key={v} onClick={()=>setView(v)} style={{flex:1,background:'transparent',border:'none',borderBottom:view===v?`2px solid ${phase.color}`:'2px solid transparent',color:view===v?'#f1f5f9':'#475569',padding:'10px 0',fontWeight:700,fontSize:14,cursor:'pointer',transition:'all .2s'}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:'16px 14px'}}>

        {/* PLAN TAB */}
        {view==='plan'&&(
          <div>
            <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:16,scrollbarWidth:'none'}}>
              {PLAN.map((wk,i)=>{
                const ph=PHASES[wk.phase];
                const rd=ALL_DAYS.filter(d=>wk.days[d]&&wk.days[d].type!=='rest');
                const done=rd.filter(d=>logs[`w${i+1}-${d}`]&&!logs[`w${i+1}-${d}`].skipped).length;
                const allDone=done===rd.length&&rd.length>0;
                const isActive=activeWeek===i;
                return (
                  <button key={i} onClick={()=>{setActiveWeek(i);setExpandedDay(null);}} style={{flexShrink:0,width:46,height:46,borderRadius:12,background:isActive?ph.color:allDone?'#0f2920':'#1e293b',border:`2px solid ${isActive?ph.color:allDone?'#10b981':'#2d3f55'}`,color:isActive?'#fff':allDone?'#10b981':'#64748b',fontWeight:800,fontSize:11,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
                    <span>{allDone?'✓':`W${wk.week}`}</span>
                    {!allDone&&done>0&&<span style={{fontSize:9,color:'#10b981'}}>{done}/{rd.length}</span>}
                  </button>
                );
              })}
            </div>

            <div style={{background:'#111827',borderRadius:16,border:`1px solid ${phase.color}33`,overflow:'hidden',marginBottom:12}}>
              <div style={{background:`linear-gradient(135deg,${phase.color}22,${phase.color}08)`,padding:'14px 16px',borderBottom:`1px solid ${phase.color}22`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{flex:1,paddingRight:12}}>
                    <div style={{fontSize:10,fontWeight:700,color:phase.color,textTransform:'uppercase',letterSpacing:2,marginBottom:3}}>Week {w.week} · {phase.name}</div>
                    <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.4}}>{w.note}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <div style={{fontSize:22,fontWeight:900,color:phase.color}}>{weekTotal(w)}</div>
                    <div style={{fontSize:10,color:'#475569'}}>this week</div>
                  </div>
                </div>
              </div>

              <div style={{padding:12,display:'flex',flexDirection:'column',gap:8}}>
                {weekDays.map(day=>{
                  const run=w.days[day],ts=TYPE_STYLE[run.type];
                  const key=`w${activeWeek+1}-${day}`,logged=logs[key];
                  const isRest=run.type==='rest',isExp=expandedDay===day;
                  const ico=logged&&!logged.skipped?'✅':logged?.skipped?'❌':run.type==='race'?'🏅':run.type==='long'?'🟢':run.type==='tempo'?'🟡':run.type==='interval'?'🟣':'🔵';
                  const instructions=getRunInstructions(run);
                  return (
                    <div key={day} style={{background:logged?(logged.skipped?'#1a0f0f':'#0a1f14'):'#1a2235',border:`1.5px solid ${logged?(logged.skipped?'#7f1d1d':'#166534'):ts.border}44`,borderRadius:12,overflow:'hidden'}}>
                      <div onClick={()=>!isRest&&setExpandedDay(isExp?null:day)} style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:12,cursor:isRest?'default':'pointer'}}>
                        <div style={{width:38,height:38,borderRadius:10,background:ts.bg,border:`1px solid ${ts.border}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{ico}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                            <span style={{fontSize:10,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:1}}>{day}</span>
                            <span style={{fontSize:10,color:'#475569',fontWeight:500}}>{getRunDate(activeWeek+1,day)}</span>
                            <span style={{fontSize:10,fontWeight:700,color:ts.text,background:ts.bg,borderRadius:4,padding:'1px 6px'}}>{ts.label}</span>
                          </div>
                          <div style={{fontSize:14,fontWeight:600,color:'#e2e8f0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{run.label}</div>
                          {logged&&!logged.skipped&&<div style={{fontSize:11,color:'#4ade80',marginTop:2}}>{logged.miles}mi @ {logged.pace}/mi · {FEEL_EMOJI[logged.feel]} {logged.feel}</div>}
                          {logged?.skipped&&<div style={{fontSize:11,color:'#f87171',marginTop:2}}>Skipped{logged.note?` — ${logged.note}`:''}</div>}
                        </div>
                        {!isRest&&<div style={{fontSize:20,color:'#334155',transition:'transform .2s',transform:isExp?'rotate(180deg)':'none',flexShrink:0}}>⌄</div>}
                      </div>

                      {isExp&&(
                        <div style={{borderTop:'1px solid #1e293b',padding:'12px 14px 14px',display:'flex',flexDirection:'column',gap:12,animation:'fadeIn .15s'}}>
                          {/* Instructions */}
                          {instructions&&(
                            <div style={{background:'#0f172a',borderRadius:10,padding:'10px 12px',borderLeft:`3px solid ${ts.border}`}}>
                              <div style={{fontSize:10,fontWeight:700,color:ts.text,textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>How to run this</div>
                              <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6}}>{instructions}</div>
                            </div>
                          )}
                          {run.pace&&<div style={{fontSize:12,color:'#64748b'}}><b style={{color:'#475569'}}>Target pace:</b> {run.pace}/mi</div>}
                          <div style={{display:'flex',gap:8}}>
                            <button onClick={()=>openLog(activeWeek,day)} style={{flex:1,background:logged?'#1e293b':phase.color,color:'#fff',border:`1px solid ${logged?'#334155':phase.color}`,borderRadius:8,padding:'10px 0',fontWeight:700,fontSize:13,cursor:'pointer'}}>{logged?'✏️ Edit log':'📝 Log run'}</button>
                            {logged&&<button onClick={()=>handleDelete(activeWeek,day)} style={{background:'#1a0f0f',color:'#f87171',border:'1px solid #7f1d1d',borderRadius:8,padding:'10px 14px',fontWeight:700,fontSize:13,cursor:'pointer'}}>✕</button>}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <button onClick={()=>setView('coach')} style={{width:'100%',background:'#0f2035',color:'#7dd3fc',border:'1px solid #1e4a6e',borderRadius:12,padding:'13px 0',fontWeight:700,fontSize:14,cursor:'pointer'}}>
              💬 Ask your coach about Week {w.week}
            </button>
          </div>
        )}

        {/* COACH TAB */}
        {view==='coach'&&(
          <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 240px)'}}>
            <div style={{background:'linear-gradient(135deg,#1a2035,#0f1a2e)',border:'1px solid #1e3a5f',borderRadius:12,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
              <div style={{fontSize:28}}>🎯</div>
              <div>
                <div style={{fontSize:12,fontWeight:800,color:'#93c5fd',letterSpacing:1}}>GOAL: SUB 2:00 HALF MARATHON</div>
                <div style={{fontSize:11,color:'#475569',marginTop:2}}>Race pace: <span style={{color:'#7dd3fc',fontWeight:700}}>9:00–9:09/mi</span> · Columbus · Oct 18, 2026</div>
              </div>
            </div>

            <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:10,paddingBottom:8}}>
              {chat.length===0&&(
                <div style={{textAlign:'center',paddingTop:20}}>
                  <div style={{fontSize:40,marginBottom:10}}>🏃</div>
                  <div style={{fontSize:15,fontWeight:700,color:'#94a3b8',marginBottom:6}}>Your coach is ready.</div>
                  <div style={{fontSize:13,color:'#475569',marginBottom:16}}>Ask anything about training, how you feel, or what to do today.</div>
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {COACH_STARTERS.map(q=>(
                      <button key={q} onClick={()=>sendChat(q)} style={{background:'#1e293b',border:'1px solid #2d3f55',color:'#94a3b8',borderRadius:20,padding:'10px 16px',fontSize:13,cursor:'pointer',textAlign:'left'}}>{q}</button>
                    ))}
                  </div>
                </div>
              )}

              {chat.map((m,i)=>(
                <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                  <div style={{maxWidth:'85%',padding:'11px 14px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',fontSize:13,lineHeight:1.6,background:m.role==='user'?'#2563eb':'#1e293b',color:m.role==='user'?'#fff':m.isError?'#64748b':'#e2e8f0',border:m.role==='assistant'?'1px solid #2d3f55':'none',whiteSpace:'pre-wrap'}}>
                    {m.role==='assistant'&&<div style={{fontSize:10,fontWeight:700,color:'#10b981',marginBottom:4,letterSpacing:1}}>COACH</div>}
                    {m.content}
                  </div>
                </div>
              ))}

              {chatLoading&&(
                <div style={{display:'flex'}}>
                  <div style={{background:'#1e293b',border:'1px solid #2d3f55',borderRadius:'18px 18px 18px 4px',padding:'12px 16px'}}>
                    <div style={{display:'flex',gap:4,alignItems:'center'}}>
                      <span style={{fontSize:10,color:'#10b981',fontWeight:700,marginRight:4}}>COACH</span>
                      {[0,1,2].map(j=><div key={j} style={{width:6,height:6,borderRadius:'50%',background:'#475569',animation:`pulse 1.2s ${j*.15}s infinite`}}/>)}
                    </div>
                  </div>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>

            <div style={{paddingTop:10,borderTop:'1px solid #1e293b'}}>
              <div style={{display:'flex',gap:8,background:'#1e293b',borderRadius:24,padding:'4px 4px 4px 16px',border:'1px solid #2d3f55'}}>
                <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendChat(chatInput)}
                  placeholder="Ask your coach anything…"
                  style={{flex:1,background:'transparent',border:'none',color:'#f1f5f9',fontSize:14,outline:'none',padding:'6px 0'}}/>
                <button onClick={()=>sendChat(chatInput)} disabled={chatLoading||!chatInput.trim()} style={{background:chatLoading||!chatInput.trim()?'#334155':'#3b82f6',color:'#fff',border:'none',borderRadius:20,padding:'8px 18px',fontWeight:700,fontSize:16,cursor:'pointer'}}>↑</button>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* LOG MODAL */}
      {logTarget&&(()=>{
        const wk=PLAN[logTarget.wi],run=wk.days[logTarget.day],ph=PHASES[wk.phase];
        const instructions=getRunInstructions(run);
        return (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:200}} onClick={e=>e.target===e.currentTarget&&setLogTarget(null)}>
            <div style={{background:'#111827',borderRadius:'20px 20px 0 0',padding:'0 24px 32px',width:'100%',maxWidth:500,border:`1px solid ${ph.color}44`,borderBottom:'none',maxHeight:'92vh',overflowY:'auto',animation:'slideUp .25s ease'}}>
              <div style={{width:36,height:4,background:'#334155',borderRadius:2,margin:'16px auto 20px'}}/>

              <div style={{fontSize:11,fontWeight:700,color:ph.color,textTransform:'uppercase',letterSpacing:2,marginBottom:2}}>Week {wk.week} · {logTarget.day} · {getRunDate(logTarget.wi+1,logTarget.day)}</div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>{run.label}</div>

              {/* Instructions in modal */}
              {instructions&&(
                <div style={{background:'#0f172a',borderRadius:10,padding:'10px 12px',marginBottom:16,borderLeft:`3px solid ${TYPE_STYLE[run.type]?.border||'#334155'}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:TYPE_STYLE[run.type]?.text||'#94a3b8',textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>How to run this</div>
                  <div style={{fontSize:12,color:'#94a3b8',lineHeight:1.6}}>{instructions}</div>
                </div>
              )}

              <button onClick={()=>setForm(f=>({...f,skipped:!f.skipped}))} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:form.skipped?'#2a0f0f':'#1e293b',border:`1px solid ${form.skipped?'#7f1d1d':'#334155'}`,borderRadius:10,padding:'11px 14px',marginBottom:16,cursor:'pointer',color:form.skipped?'#f87171':'#64748b'}}>
                <span style={{fontSize:13,fontWeight:600}}>I skipped this run</span>
                <span style={{fontSize:18}}>{form.skipped?'✓':'○'}</span>
              </button>

              {!form.skipped&&(<div>
                <div style={{display:'flex',background:'#0f172a',borderRadius:10,padding:3,marginBottom:16,border:'1px solid #1e293b'}}>
                  {[['time','⏱ Time → Pace'],['manual','✏️ Enter Pace']].map(([mode,label])=>(
                    <button key={mode} onClick={()=>setForm(f=>({...f,inputMode:mode}))} style={{flex:1,background:form.inputMode===mode?ph.color:'transparent',color:form.inputMode===mode?'#fff':'#475569',border:'none',borderRadius:8,padding:'8px 0',fontSize:12,fontWeight:700,cursor:'pointer'}}>{label}</button>
                  ))}
                </div>

                <div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:'#475569',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Miles Ran</label>
                  <input value={form.miles} onChange={e=>setForm(f=>({...f,miles:e.target.value}))} placeholder={run.label.match(/[\d.]+/)?.[0]||'e.g. 3.1'} type="number" step="0.1" style={{width:'100%',background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 14px',color:'#f1f5f9',fontSize:16,fontWeight:600}}/>
                </div>

                {form.inputMode==='time'&&(<div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:'#475569',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Total Time</label>
                  <div style={{display:'flex',gap:10,alignItems:'center'}}>
                    <div style={{flex:1,textAlign:'center'}}>
                      <input value={form.totalMins} onChange={e=>setForm(f=>({...f,totalMins:e.target.value}))} placeholder="28" type="number" min="0" style={{width:'100%',background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 0',color:'#f1f5f9',fontSize:22,fontWeight:800,textAlign:'center'}}/>
                      <div style={{fontSize:11,color:'#475569',marginTop:4}}>min</div>
                    </div>
                    <div style={{fontSize:26,color:'#334155',fontWeight:900,paddingBottom:20}}>:</div>
                    <div style={{flex:1,textAlign:'center'}}>
                      <input value={form.totalSecs} onChange={e=>setForm(f=>({...f,totalSecs:e.target.value}))} placeholder="45" type="number" min="0" max="59" style={{width:'100%',background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 0',color:'#f1f5f9',fontSize:22,fontWeight:800,textAlign:'center'}}/>
                      <div style={{fontSize:11,color:'#475569',marginTop:4}}>sec</div>
                    </div>
                  </div>
                  {livePace
                    ?<div style={{marginTop:12,background:'#0a1f14',border:'1px solid #166534',borderRadius:10,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,color:'#4ade80',fontWeight:600}}>Your pace</span><span style={{fontSize:26,fontWeight:900,color:'#4ade80'}}>{livePace}<span style={{fontSize:13,fontWeight:400,marginLeft:4}}>/mi</span></span></div>
                    :<div style={{marginTop:8,fontSize:12,color:'#334155',textAlign:'center'}}>Enter miles + time to calculate pace</div>
                  }
                </div>)}

                {form.inputMode==='manual'&&(<div style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:700,color:'#475569',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Pace (min/mi)</label>
                  <input value={form.pace} onChange={e=>setForm(f=>({...f,pace:e.target.value}))} placeholder="9:20" style={{width:'100%',background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 14px',color:'#f1f5f9',fontSize:16,fontWeight:600}}/>
                </div>)}

                <div style={{marginBottom:16}}>
                  <label style={{fontSize:11,fontWeight:700,color:'#475569',display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>How did it feel?</label>
                  <div style={{display:'flex',gap:6}}>
                    {FEEL.map(f=>(
                      <button key={f} onClick={()=>setForm(lf=>({...lf,feel:f}))} style={{flex:1,background:form.feel===f?ph.color:'#0f172a',color:form.feel===f?'#fff':'#475569',border:`1px solid ${form.feel===f?ph.color:'#1e293b'}`,borderRadius:10,padding:'8px 0',fontSize:10,fontWeight:700,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                        <span style={{fontSize:18}}>{FEEL_EMOJI[f]}</span><span>{f}</span>
                      </button>
                    ))}
                  </div>
                </div>
              </div>)}

              <div style={{marginBottom:18}}>
                <label style={{fontSize:11,fontWeight:700,color:'#475569',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>{form.skipped?'Why did you skip?':'Notes (optional)'}</label>
                <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder={form.skipped?'e.g. knee pain, walked instead…':'e.g. felt strong, legs heavy…'} rows={2} style={{width:'100%',background:'#0f172a',border:'1px solid #1e293b',borderRadius:10,padding:'12px 14px',color:'#f1f5f9',fontSize:13,resize:'none'}}/>
              </div>

              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setLogTarget(null)} style={{flex:1,background:'#1e293b',color:'#64748b',border:'1px solid #334155',borderRadius:12,padding:'13px 0',fontWeight:700,fontSize:14,cursor:'pointer'}}>Cancel</button>
                <button onClick={handleSave} disabled={saving} style={{flex:2,background:saving?'#334155':ph.color,color:'#fff',border:'none',borderRadius:12,padding:'13px 0',fontWeight:800,fontSize:14,cursor:'pointer'}}>{saving?'Saving…':form.skipped?'Mark Skipped':'Save Run ✓'}</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
